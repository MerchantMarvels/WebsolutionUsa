---
deployment:
  tasks:
    # Adjust these paths for your account
    - export HOME=/home/websolutionusa
    - export REPO=$HOME/repos/WebsolutionUsa
    - export FRONT_DST=$HOME/public_html
    - export APP_ROOT=$HOME/apps/api

    # Use the nodevenv that cPanel shows on your Node app card
    # Example path (EDIT to your actual): $HOME/nodevenv/api/20/bin
    - export NODEBIN=$HOME/nodevenv/api/20/bin
    - export NPM="$NODEBIN/npm"
    - export NPX="$NODEBIN/npx"

    # 1) Install & build CLIENT (React)
    - cd $REPO/client && $NPM ci
    - cd $REPO/client && $NPM run build

    # 2) Deploy CLIENT build to public_html (add/update/delete via rsync)
    - /bin/rsync -a --delete $REPO/client/build/ $FRONT_DST/

    # 3) Install SERVER deps (production)
    - cd $REPO/server && $NPM ci --omit=dev

    # 4) Sync SERVER code (excluding node_modules because installed above)
    - /bin/rsync -a --delete \
        --exclude node_modules \
        --exclude .env \
        $REPO/server/ $APP_ROOT/

    # 5) Restart Passenger Node app
    - /bin/mkdir -p $APP_ROOT/tmp
    - /usr/bin/touch $APP_ROOT/tmp/restart.txt
